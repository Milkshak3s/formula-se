name: agent-build

# Builds the standalone Windows executable for the Formula SE server agent so
# game-server operators can download it without installing Python.
#
#  * Pull requests touching agent/ → build + test, exe uploaded as an artifact.
#  * Push a tag like `agent-v1.0.0`  → build + test, exe attached to a Release.
#  * Manual run via the Actions tab   → build + test, exe uploaded as an artifact.

on:
  push:
    tags:
      - "agent-v*"
  pull_request:
    paths:
      - "agent/**"
      - ".github/workflows/agent-build.yml"
  workflow_dispatch:

permissions:
  contents: write # needed to create/attach the Release on tag pushes

jobs:
  build:
    name: Build Windows executable
    runs-on: windows-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build & test dependencies
        run: python -m pip install --upgrade pip pyinstaller pytest

      - name: Run tests
        run: pytest -q

      - name: Build single-file executable
        run: pyinstaller --onefile --name fse-agent --clean run_agent.py

      - name: Smoke-test the executable
        run: dist/fse-agent.exe --help

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fse-agent-windows
          path: |
            agent/dist/fse-agent.exe
            agent/config.example.toml
            agent/README.md
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/agent-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/dist/fse-agent.exe
            agent/config.example.toml
            agent/README.md
          generate_release_notes: true
