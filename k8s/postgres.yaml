# In-cluster Postgres for a self-contained deployment. For production, a managed
# database (RDS / Cloud SQL) or an operator (CloudNativePG) is recommended — in
# that case delete this file from the kustomization and point DATABASE_URL at it.
apiVersion: v1
kind: Service
metadata:
  name: formula-se-postgres
  labels:
    app.kubernetes.io/part-of: formula-se
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None  # headless, for stable StatefulSet DNS
  selector:
    app.kubernetes.io/name: formula-se
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: formula-se-postgres
  labels:
    app.kubernetes.io/part-of: formula-se
    app.kubernetes.io/component: postgres
spec:
  serviceName: formula-se-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: formula-se
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: formula-se
        app.kubernetes.io/component: postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: formula-se-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: formula-se-config
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: formula-se-secrets
                  key: POSTGRES_PASSWORD
            # Use a subdirectory so the mount root (lost+found) doesn't upset initdb.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
