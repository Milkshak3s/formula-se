# Ingress lockdown: deny all pod ingress by default, then allow only the needed
# paths. Egress is left open so pods can reach DNS, Postgres, and Backblaze B2.
# NOTE: kubelet health-probe traffic is generally exempt, but on some CNIs you
# may need to allow the node/host source explicitly.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  labels:
    app.kubernetes.io/part-of: formula-se
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-from-ingress
  labels:
    app.kubernetes.io/part-of: formula-se
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: formula-se
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-from-web
  labels:
    app.kubernetes.io/part-of: formula-se
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: formula-se
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: formula-se
              app.kubernetes.io/component: web
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-app
  labels:
    app.kubernetes.io/part-of: formula-se
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: formula-se
      app.kubernetes.io/component: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: formula-se
              app.kubernetes.io/component: api
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: formula-se
              app.kubernetes.io/component: worker
      ports:
        - protocol: TCP
          port: 5432
