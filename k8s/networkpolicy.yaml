# Ingress lockdown for the app tiers. Egress is left open so pods can reach DNS,
# Postgres, and Backblaze B2.
#
# Scope note: the default-deny below selects only our own workloads
# (app.kubernetes.io/name: formula-se), NOT the CloudNativePG-managed database
# pods — the operator owns DB pod networking (replication, operator↔instance,
# metrics), and constraining it here would break the cluster. The app reaches
# the DB via (open) egress to the formula-se-db-rw service.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  labels:
    app.kubernetes.io/part-of: formula-se
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: formula-se
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-from-ingress
  labels:
    app.kubernetes.io/part-of: formula-se
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: formula-se
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-from-web
  labels:
    app.kubernetes.io/part-of: formula-se
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: formula-se
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: formula-se
              app.kubernetes.io/component: web
      ports:
        - protocol: TCP
          port: 8000
