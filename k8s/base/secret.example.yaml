# Copy to secret.yaml and fill in real values, OR (recommended) manage these with
# Sealed Secrets / External Secrets / a cloud secret manager and delete this file
# from the kustomization. secret.yaml is gitignored so real values never commit.
#
#   cp k8s/secret.example.yaml k8s/secret.yaml && edit k8s/secret.yaml
#
# NOTE: the database password/URL is NOT here — CloudNativePG generates the
# `formula-se-db-app` secret (with a ready-to-use `uri`) that the app consumes.
apiVersion: v1
kind: Secret
metadata:
  name: formula-se-secrets
  labels:
    app.kubernetes.io/part-of: formula-se
type: Opaque
stringData:
  # Backblaze B2 credentials (application key + its id).
  B2_KEY_ID: "CHANGE_ME"
  B2_APPLICATION_KEY: "CHANGE_ME"

  # Bootstrap admin, created on first startup if absent.
  BOOTSTRAP_ADMIN_EMAIL: "admin@example.com"
  BOOTSTRAP_ADMIN_PASSWORD: "CHANGE_ME_ADMIN_PASSWORD"

  # Registration invite code (rotatable later in the admin UI).
  DEFAULT_INVITE_CODE: "CHANGE_ME_INVITE_CODE"
