apiVersion: apps/v1
kind: Deployment
metadata:
  name: formula-se-api
  labels:
    app.kubernetes.io/part-of: formula-se
    app.kubernetes.io/component: api
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: formula-se
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: formula-se
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Spread replicas across nodes for availability.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: formula-se
                    app.kubernetes.io/component: api
      initContainers:
        # Apply DB migrations before serving. Safe with multiple replicas: the
        # alembic env takes a Postgres advisory lock, so concurrent runs serialize
        # and no-op once the DB is at head.
        - name: migrate
          image: ghcr.io/milkshak3s/formula-se-backend:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: formula-se-config
            - secretRef:
                name: formula-se-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      containers:
        - name: api
          image: ghcr.io/milkshak3s/formula-se-backend:latest
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: formula-se-config
            - secretRef:
                name: formula-se-secrets
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 3
            failureThreshold: 20  # up to ~60s for first-boot seeding
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: formula-se-api
  labels:
    app.kubernetes.io/part-of: formula-se
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: formula-se
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: formula-se-api
  labels:
    app.kubernetes.io/part-of: formula-se
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: formula-se-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: formula-se-api
  labels:
    app.kubernetes.io/part-of: formula-se
    app.kubernetes.io/component: api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: formula-se
      app.kubernetes.io/component: api
