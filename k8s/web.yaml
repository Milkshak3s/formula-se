apiVersion: apps/v1
kind: Deployment
metadata:
  name: formula-se-web
  labels:
    app.kubernetes.io/part-of: formula-se
    app.kubernetes.io/component: web
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: formula-se
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: formula-se
        app.kubernetes.io/component: web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: formula-se
                    app.kubernetes.io/component: web
      containers:
        - name: web
          image: ghcr.io/milkshak3s/formula-se-web:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            # Caddy proxies /api/* to the API service (see frontend/Caddyfile).
            - name: API_UPSTREAM
              value: formula-se-api:8000
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          emptyDir: {}
        - name: config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: formula-se-web
  labels:
    app.kubernetes.io/part-of: formula-se
    app.kubernetes.io/component: web
spec:
  selector:
    app.kubernetes.io/name: formula-se
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: formula-se-web
  labels:
    app.kubernetes.io/part-of: formula-se
    app.kubernetes.io/component: web
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: formula-se
      app.kubernetes.io/component: web
