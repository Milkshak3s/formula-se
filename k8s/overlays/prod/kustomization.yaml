apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Cluster-specific overlay for the fse.mlk.sh deployment on the Talos cluster.
resources:
  - ../../base

# Real images live on Docker Hub (public); override the base's placeholder refs.
images:
  - name: ghcr.io/milkshak3s/formula-se-backend
    newName: docker.io/gobworks/formula-se-backend
    newTag: "0.1.17"
  - name: ghcr.io/milkshak3s/formula-se-web
    newName: docker.io/gobworks/formula-se-web
    newTag: "0.1.17"

patches:
  # Point the ingress at the real host + TLS secret.
  - target:
      kind: Ingress
      name: formula-se
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: fse.mlk.sh
      - op: replace
        path: /spec/tls/0/hosts/0
        value: fse.mlk.sh
      - op: replace
        path: /spec/tls/0/secretName
        value: fse-mlk-sh-tls
  # Put the database on the SSD storage class.
  - target:
      kind: Cluster
      name: formula-se-db
    patch: |-
      - op: add
        path: /spec/storage/storageClass
        value: ssd
